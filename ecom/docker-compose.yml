version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ecommerce_app
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./logs:/app/logs
    networks:
      - ecommerce_network
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  ecommerce_network:
    driver: bridge
