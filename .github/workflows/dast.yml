name: DAST Scan

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build app image
        run: docker build -t pr7-app ./PR7/app

      - name: Start app container
        run: |
          docker run -d \
            --name pr7-app \
            --add-host=host.docker.internal:host-gateway \
            -p 5000:5000 \
            pr7-app
          sleep 20
          docker ps
          docker logs pr7-app || true

      - name: Check app availability
        run: |
          curl -v http://127.0.0.1:5000 || true

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://host.docker.internal:5000"
          cmd_options: "-a"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Show container logs on failure
        if: failure()
        run: docker logs pr7-app || true

      - name: Stop app container
        if: always()
        run: docker rm -f pr7-app || true
