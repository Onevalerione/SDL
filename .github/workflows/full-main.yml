name: Full Security Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST
        run: |
          mkdir -p reports/sast
          bandit -r ./PR7/app -f json -o reports/sast/bandit-report.json || true
          bandit -r ./PR7/app -f txt -o reports/sast/bandit-report.txt || true

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-main-report
          path: reports/sast/

  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: sast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create zapnet

      - name: Build app image
        run: docker build -t pr7-app ./PR7/app

      - name: Start app container
        run: |
          docker run -d \
            --name pr7-app \
            --network zapnet \
            -p 5000:5000 \
            pr7-app
          docker ps

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if docker run --rm --network zapnet curlimages/curl:8.8.0 \
              -fsS http://pr7-app:5000 > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          docker logs pr7-app || true
          exit 1

      - name: Prepare report files
        run: |
          mkdir -p reports/dast
          touch reports/dast/report_html.html reports/dast/report_json.json reports/dast/report_md.md
          chmod 666 reports/dast/report_html.html reports/dast/report_json.json reports/dast/report_md.md

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            --network zapnet \
            -v ${{ github.workspace }}/reports/dast:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://pr7-app:5000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -I

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-main-report
          path: reports/dast/

      - name: Show app logs
        if: always()
        run: docker logs pr7-app || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f pr7-app || true
          docker network rm zapnet || true
