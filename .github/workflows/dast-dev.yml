name: DAST Develop Branch

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create zapnet

      - name: Build app image
        run: docker build -t pr7-app ./PR7/app

      - name: Start app container
        run: |
          docker run -d \
            --name pr7-app \
            --network zapnet \
            -p 5000:5000 \
            pr7-app
          docker ps

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if docker run --rm --network zapnet curlimages/curl:8.8.0 \
              -fsS http://pr7-app:5000 > /dev/null; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          docker logs pr7-app || true
          exit 1

      - name: Prepare report files
        run: |
          touch report_html.html report_json.json report_md.md
          chmod 666 report_html.html report_json.json report_md.md
          ls -l report_html.html report_json.json report_md.md

      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            --network zapnet \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://pr7-app:5000 \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -I

      - name: Show generated files
        if: always()
        run: |
          ls -la
          test -f report_html.html && echo "report_html.html exists"
          test -f report_json.json && echo "report_json.json exists"
          test -f report_md.md && echo "report_md.md exists"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Show app logs
        if: always()
        run: docker logs pr7-app || true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f pr7-app || true
          docker network rm zapnet || true
