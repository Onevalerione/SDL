version: "3.9"
services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_DB: sigmabd
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appsecret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d sigmabd -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10

  pinger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Pinger
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./logs:/logs 
#        type: bind
#        source: ./logs
#        target: /logs
    # Если требуется резолв “ip-bd”, можно добавить extra_hosts или использовать имя сервиса db
    # extra_hosts:
    #   - "ip-bd:db"

volumes:
  pinger_logs:
