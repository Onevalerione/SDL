version: "3.9"

services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_DB: sigmabd
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appsecret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d sigmabd -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  vault:
    image: hashicorp/vault:latest
    container_name: vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: vault server -dev -dev-root-token-id=root
    restart: unless-stopped

  pinger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Pinger
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID: ${VAULT_ROLE_ID}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID}
      VAULT_SECRET_PATH: secret/data/db-creds
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sigmabd
    volumes:
      - ./logs:/logs
    restart: unless-stopped

volumes:
  postgres_data:
